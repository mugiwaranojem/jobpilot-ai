version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobpilot-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - jobpilot-network

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: jobpilot-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      TZ: Asia/Manila
      GENERIC_TIMEZONE: Asia/Manila
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/
    volumes:
      - ./n8n_data:/home/node/.n8n
    depends_on:
      - backend
    networks:
      - jobpilot-network

networks:
  jobpilot-network:
    driver: bridge